<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White rounded background -->
  <rect width="64" height="64" rx="14" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- Ears -->
  <ellipse cx="16" cy="18" rx="8" ry="10" fill="#FFA0A0" />
  <ellipse cx="48" cy="18" rx="8" ry="10" fill="#FFA0A0" />

  <!-- Head -->
  <ellipse cx="32" cy="34" rx="22" ry="20" fill="#FFB8B8" />

  <!-- Eyes -->
  <circle cx="24" cy="32" r="3" fill="#4A4A4A" />
  <circle cx="40" cy="32" r="3" fill="#4A4A4A" />

  <!-- Cheek blush -->
  <ellipse cx="18" cy="36" rx="3.6" ry="2.4" fill="#FFCCD0" opacity="0.6" />
  <ellipse cx="46" cy="36" rx="3.6" ry="2.4" fill="#FFCCD0" opacity="0.6" />

  <!-- Snout -->
  <ellipse cx="32" cy="40" rx="9" ry="7" fill="#FFA0A0" />

  <!-- Nostrils -->
  <ellipse cx="28" cy="40" rx="1.6" ry="2" fill="#D48888" />
  <ellipse cx="36" cy="40" rx="1.6" ry="2" fill="#D48888" />
</svg>
